name: build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  BuildAndTestLinux:
    name: Linux ${{ matrix.os }} / Swift ${{ matrix.swift-version }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04]
        swift-version: ["6.3.1"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: SwiftyLab/setup-swift@v1
        with:
          swift-version: ${{ matrix.swift-version }}
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev curl unzip
      - name: Build
        run: swift build -c release -Xswiftc -strict-concurrency=complete
      - name: Build tests
        # -v captures compiler invocations for SwiftLint analyze; redirected
        # to file to keep the CI log readable.
        run: swift build --build-tests -v > build.log 2>&1
      - name: Run tests
        run: swift test --skip-build
      - name: Install SwiftLint
        # SwiftLint's prebuilt Linux binary requires a GLIBC only present on 24.04+
        if: matrix.os == 'ubuntu-24.04'
        run: |
          curl -sL https://github.com/realm/SwiftLint/releases/download/0.63.2/swiftlint_linux_amd64.zip -o swiftlint.zip
          unzip -o swiftlint.zip -d /usr/local/bin
          chmod +x /usr/local/bin/swiftlint
      - name: SwiftLint unused imports
        if: matrix.os == 'ubuntu-24.04'
        run: swiftlint analyze --strict --quiet --compiler-log-path build.log

  BuildAndTestMacOS:
    name: macOS / Swift ${{ matrix.swift-version }}
    strategy:
      fail-fast: false
      matrix:
        swift-version: ["6.3.1"]
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - uses: SwiftyLab/setup-swift@v1
        with:
          swift-version: ${{ matrix.swift-version }}
      - name: Build
        run: swift build -c release -Xswiftc -strict-concurrency=complete
      - name: Run tests
        run: swift test

  SwiftSyntaxMatrix:
    name: swift-syntax ${{ matrix.swift-syntax-major }}.x / Swift ${{ matrix.swift-version }}
    strategy:
      fail-fast: false
      matrix:
        swift-version: ["6.3.1"]
        # Single supported major today (floor + ceiling = 603..<604).
        swift-syntax-major: ["603"]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: SwiftyLab/setup-swift@v1
        with:
          swift-version: ${{ matrix.swift-version }}
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev
      - name: Pin swift-syntax to ${{ matrix.swift-syntax-major }}.x
        # Narrow the declared range to a single major so SPM resolves
        # to the matrix's swift-syntax version. Targets the exact range
        # string in Package.swift; if that string changes the sed
        # needs to follow.
        run: |
          next=$((${{ matrix.swift-syntax-major }} + 1))
          sed -i 's|"603.0.0"..<"604.0.0"|"${{ matrix.swift-syntax-major }}.0.0"..<"'${next}'.0.0"|' Package.swift
          grep swift-syntax Package.swift
      - name: Resolve dependencies
        run: swift package update
      - name: Build
        run: swift build -c release -Xswiftc -strict-concurrency=complete
      - name: Run tests
        run: swift test

  StaticLinuxSDK:
    name: Static Linux SDK (cross-compile to aarch64-musl)
    runs-on: ubuntu-24.04
    container:
      image: swift:6.3.1-noble
    steps:
      - uses: actions/checkout@v6
      - name: Install Static Linux SDK
        run: swift sdk install https://download.swift.org/swift-6.3.1-release/static-sdk/swift-6.3.1-RELEASE/swift-6.3.1-RELEASE_static-linux-0.1.0.artifactbundle.tar.gz --checksum fac05271c1f7d060bd203240ce5251d5ca902d30ac899f553765dbb3a88b97ad
      - name: Cross-compile for ARM64 Linux
        run: swift build -c release --swift-sdk aarch64-swift-linux-musl

  SwiftLint:
    name: SwiftLint 0.63.2
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Install SwiftLint
        # Pin the same SwiftLint the BuildAndTest job's `analyze` step
        # uses, so CI matches a modern local install. The prebuilt Linux
        # binary needs the GLIBC on ubuntu-24.04+.
        run: |
          curl -sL https://github.com/realm/SwiftLint/releases/download/0.63.2/swiftlint_linux_amd64.zip -o swiftlint.zip
          unzip -o swiftlint.zip -d /usr/local/bin
          chmod +x /usr/local/bin/swiftlint
      - name: SwiftLint
        run: swiftlint lint --quiet

  SwiftFormat:
    name: swift-format / Swift ${{ matrix.swift-version }}
    strategy:
      matrix:
        swift-version: ["6.3"]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: SwiftyLab/setup-swift@v1
        with:
          swift-version: ${{ matrix.swift-version }}
      - name: Run swift-format
        run: swift-format format --recursive --in-place .
      - name: Check for formatting differences
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git diff --exit-code

  Coverage:
    name: Coverage / Swift ${{ matrix.swift-version }}
    strategy:
      matrix:
        swift-version: ["6.3.1"]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: SwiftyLab/setup-swift@v1
        with:
          swift-version: ${{ matrix.swift-version }}
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y curl libssl-dev
      - name: Run tests with coverage
        run: swift test --enable-code-coverage --xunit-output test-results.xml
      - name: Convert to LCOV
        run: |
          BIN_PATH=$(swift build --show-bin-path)
          PROFDATA=$(find .build -name 'default.profdata' -path '*/codecov/*' | head -1)
          XCTEST=$(find "$BIN_PATH" -name '*.xctest' -type f | head -1)
          llvm-cov export \
            -format=lcov \
            -instr-profile="$PROFDATA" \
            "$XCTEST" \
            -ignore-filename-regex=".build|Tests" \
            > coverage.lcov
      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          files: coverage.lcov
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload test results
        uses: codecov/codecov-action@v6
        if: always()
        with:
          files: test-results.xml
          report_type: test_results
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
